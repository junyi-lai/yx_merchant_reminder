[website]
# 远行商人网页地址
url = https://roco.dayun.cool/?mode=obs1
# 请求超时时间（秒）
timeout = 10
# 最大重试次数
max_retries = 3

[serverchan]
# Server 酱 SendKey，用于微信推送
# 支持多个账户，用逗号分隔
# 获取方式：
# 1. 微信关注"方糖"公众号
# 2. 访问 https://sct.ftqq.com/ 获取 SendKey
# 3. 将 SendKey 填写到下方
sckey = 

[log]
# 日志级别：DEBUG, INFO, WARNING, ERROR, CRITICAL
level = INFO
# 日志文件编码（Windows 推荐 gbk，Linux/Mac 推荐 utf-8）
encoding = gbk
# 日志格式
format = %(asctime)s - %(name)s - %(levelname)s - %(message)s
